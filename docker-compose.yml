version: "3.9"

services:

  db:
    image: postgres:14
    container_name: hm_postgres_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: mydb
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: hm_fastapi_app
    depends_on:
      - db
    ports:
      - "8201:8000"
    environment:
      DATABASE_URL: postgresql://user:pass@db:5432/mydb

  frontend:
    build: ./frontend
    container_name: hm_react_app
    ports:
      - "4200:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
